<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba de voz</title>
</head>
<body>
  <button id="btnHablar">Probar voz</button>
  <p id="estado">Esperando...</p>

  <script>
    const synth = window.speechSynthesis;
    let voces = [];

    function cargarVoces() {
      voces = synth.getVoices();
      document.getElementById("estado").innerText =
        "Voces detectadas: " + voces.length;
      console.log("Voces:", voces);
    }

    cargarVoces();

    if ("onvoiceschanged" in synth) {
      synth.onvoiceschanged = cargarVoces;
    }

    document.getElementById("btnHablar").addEventListener("click", () => {
      synth.cancel();

      const msg = new SpeechSynthesisUtterance("Hola, esta es una prueba de voz");
      msg.lang = "es-ES";
      msg.rate = 1;
      msg.pitch = 1;

      // Buscar una voz en español si existe
      const vozEspanol = voces.find(v => v.lang.startsWith("es"));
      if (vozEspanol) {
        msg.voice = vozEspanol;
      }

      msg.onstart = () => {
        document.getElementById("estado").innerText = "Hablando...";
      };

      msg.onend = () => {
        document.getElementById("estado").innerText = "Terminó de hablar";
      };

      msg.onerror = (e) => {
        document.getElementById("estado").innerText =
          "Error al hablar: " + e.error;
        console.error("Speech error:", e);
      };

      synth.speak(msg);
    });
  </script>
</body>
</html>
