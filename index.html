<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>KineSign</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.3/dist/teachablemachine-pose.min.js"></script>

  <style>
    /* Reset básico */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f5f7fb;
      color: #1c1c1e;
      text-align: center;
    }

    /* Contenedor principal */
    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    /* Título */
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    /* Botón */
    button {
      background: linear-gradient(135deg, #4A90E2, #357ABD);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 15px 0;
      transition: 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.98);
    }

    /* Canvas de cámara */
    canvas {
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      margin-top: 10px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
      background: #000;
    }

    /* Tarjeta resultado */
    .result-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.08);
    }

    /* Texto principal */
    .result-text {
      font-size: 32px;
      font-weight: bold;
    }

    /* Confianza */
    .confidence {
      font-size: 14px;
      color: #8e8e93;
      margin-top: 5px;
    }

    /* Estado hablando */
    .speaking {
      margin-top: 10px;
      font-size: 16px;
      color: #4A90E2;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>KineSign</h1>

    <button onclick="init()">Start camera</button>

    <div>
      <canvas id="canvas"></canvas>
    </div>

    <div class="result-card">
      <div id="result" class="result-text">Waiting...</div>
      <div id="confidence" class="confidence">Confidence: 0%</div>
    <div id="estadoVoz" class="speaking">Voice not initialized</div>
    </div>
  </div>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/T-L_vfL0y/";
    const synth = window.speechSynthesis;

    let model, webcam, ctx, maxPredictions;
    let voces = [];
    let ultimaPrediccionHablada = "";
    let ultimoTiempoHablado = 0;

    const UMBRAL_CONFIANZA = 0.90;
    const TIEMPO_ENTRE_VOCES = 3000; // milisegundos

    function cargarVoces() {
      voces = synth.getVoices();
      document.getElementById("estadoVoz").innerText =
        "Detected Voices: " + voces.length;
      console.log("Available Voices:", voces);
    }

    function hablar(texto) {
      if (!("speechSynthesis" in window)) {
        document.getElementById("estadoVoz").innerText =
          ""This browser does not support speech synthesis"";
        return;
      }

      synth.cancel();

      const msg = new SpeechSynthesisUtterance(texto);
      msg.lang = "en-US";
      msg.rate = 1;
      msg.pitch = 1;


      const vozIngles = voces.find(v => v.lang && v.lang.startsWith("en"));
if (vozIngles) {
  msg.voice = vozIngles;
}
    /*  const vozEspanol = voces.find(v => v.lang && v.lang.startsWith("es"));
      if (vozEspanol) {
        msg.voice = vozEspanol;
      }*/

      msg.onstart = () => {
        document.getElementById("estadoVoz").innerText =
          "Speaking: " + texto;
      };

      msg.onend = () => {
        document.getElementById("estadoVoz").innerText =
       "Last spoken: " + texto;
      };

      msg.onerror = (e) => {
        document.getElementById("estadoVoz").innerText =
         "Voice error: " + e.error;
        console.error("Error TTS:", e);
      };



      synth.speak(msg);
    }

    async function init() {
      cargarVoces();

      if ("onvoiceschanged" in synth) {
        synth.onvoiceschanged = cargarVoces;
      }

      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmPose.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      const size = 300;
      const flip = true;
      webcam = new tmPose.Webcam(size, size, flip);
      await webcam.setup();
      await webcam.play();

      const canvas = document.getElementById("canvas");
      canvas.width = size;
      canvas.height = size;
      ctx = canvas.getContext("2d");

      window.requestAnimationFrame(loop);
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
      const prediction = await model.predict(posenetOutput);

      let best = prediction[0];
      for (let i = 1; i < prediction.length; i++) {
        if (prediction[i].probability > best.probability) {
          best = prediction[i];
        }
      }

      if (best.probability >= UMBRAL_CONFIANZA) {
        document.getElementById("result").innerText = best.className;
        document.getElementById("confidence").innerText =
          "Confianza: " + (best.probability * 100).toFixed(1) + "%";
      } else {
        document.getElementById("result").innerText = "Esperando...";
        document.getElementById("confidence").innerText =
          "Confianza: " + (best.probability * 100).toFixed(1) + "%";
      }

      const ahora = Date.now();

      if (
        best.probability >= UMBRAL_CONFIANZA &&
        (
          best.className !== ultimaPrediccionHablada ||
          ahora - ultimoTiempoHablado > TIEMPO_ENTRE_VOCES
        )
      ) {
        hablar(best.className);
        ultimaPrediccionHablada = best.className;
        ultimoTiempoHablado = ahora;
      }

      // Enviar a App Inventor si está dentro de WebViewer
      if (window.AppInventor && window.AppInventor.setWebViewString) {
        window.AppInventor.setWebViewString(JSON.stringify({
          prediccion: best.className,
          confianza: best.probability
        }));
      }

      if (pose && webcam.canvas) {
        ctx.drawImage(webcam.canvas, 0, 0);
        const minPartConfidence = 0.5;
        tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
        tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
      }
    }
  </script>
</body>
</html>
